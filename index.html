<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ Cắt Ảnh Liên Quân</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center py-10">

    <h1 class="text-3xl font-bold mb-6 text-yellow-500">AOV Skin Cropper Custom</h1>
    
    <div class="w-full max-w-2xl bg-slate-800 p-6 rounded-xl shadow-2xl">
        <input type="file" id="upload" accept="image/*" class="mb-4 block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-yellow-500 file:text-slate-900 hover:file:bg-yellow-400">

        <div class="relative w-full h-96 bg-black rounded overflow-hidden mb-4">
            <img id="image" class="max-w-full hidden">
        </div>

        <div class="flex gap-4">
            <button id="cropBtn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-lg font-bold transition">Cắt & Tải về</button>
        </div>
    </div>

    <canvas id="canvas" class="hidden"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const image = document.getElementById('image');
        const upload = document.getElementById('upload');
        const cropBtn = document.getElementById('cropBtn');
        let cropper;

        upload.addEventListener('change', (e) => {
            const files = e.target.files;
            const done = (url) => {
                upload.value = '';
                image.src = url;
                image.classList.remove('hidden');
                if (cropper) cropper.destroy();
                cropper = new Cropper(image, {
                    aspectRatio: 1, // Bạn có thể chỉnh 16/9 hoặc 3/4 tùy ý
                    viewMode: 1,
                });
            };

            if (files && files.length > 0) {
                const reader = new FileReader();
                reader.onload = () => done(reader.result);
                reader.readAsDataURL(files[0]);
            }
        });

        cropBtn.addEventListener('click', () => {
            if (!cropper) return alert('Vui lòng chọn ảnh trước!');
            const canvas = cropper.getCroppedCanvas();
            const link = document.createElement('a');
            link.download = 'lien-quan-skin.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    </script>
</body>
</html>
