<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghép Ảnh Trang Phục Liên Quân</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .drop-zone { border: 2px dashed #cbd5e1; transition: 0.3s; }
        .drop-zone:hover { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-slate-800 p-4 text-white flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-500 p-2 rounded-lg">📸</div>
                <span class="font-bold text-xl">AOV Skin Merger</span>
            </div>
            <button class="text-sm bg-slate-700 px-4 py-2 rounded-lg">Trang chủ</button>
        </div>

        <div class="p-8">
            <label for="fileInput" class="drop-zone block w-full py-12 rounded-xl cursor-pointer text-center">
                <div class="text-4xl mb-2">📤</div>
                <p class="text-slate-600 font-medium">Nhấn vào đây để chọn ảnh trang phục cần ghép</p>
                <p class="text-xs text-slate-400 mt-2">Lưu ý: Có thể chọn nhiều ảnh cùng lúc</p>
                <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
            </label>
        </div>

        <div class="px-8 pb-8">
            <div class="border rounded-xl p-6 bg-slate-50">
                <h2 class="font-bold text-lg mb-4">Thông tin ghép ảnh</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="flex items-center justify-between">
                        <label class="text-slate-600">Mỗi hàng có</label>
                        <input type="number" id="cols" value="6" class="border rounded px-3 py-1 w-20 text-center">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="text-slate-600">Khoảng cách giữa các hàng (px)</label>
                        <input type="number" id="gap" value="10" class="border rounded px-3 py-1 w-20 text-center">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="text-slate-600">Số tướng đã sở hữu</label>
                        <input type="number" id="heroCount" value="100" class="border rounded px-3 py-1 w-20 text-center">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="text-slate-600">Số trang phục đã sở hữu</label>
                        <input type="number" id="skinCount" value="200" class="border rounded px-3 py-1 w-20 text-center">
                    </div>
                </div>

                <div class="mt-8 flex gap-4">
                    <button id="renderBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-8 rounded-lg transition">Ghép ảnh ngay</button>
                    <button id="downloadBtn" class="hidden bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-8 rounded-lg transition">Tải ảnh về</button>
                </div>
            </div>
        </div>

        <div class="p-8 border-t bg-slate-100 flex justify-center">
            <canvas id="resultCanvas" class="max-w-full shadow-md bg-white"></canvas>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const renderBtn = document.getElementById('renderBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const canvas = document.getElementById('resultCanvas');
        const ctx = canvas.getContext('2d');

        let loadedImages = [];

        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            loadedImages = [];
            
            for (const file of files) {
                const img = await loadImage(URL.createObjectURL(file));
                loadedImages.push(img);
            }
            alert(`Đã chọn ${loadedImages.length} ảnh. Nhấn "Ghép ảnh ngay" để xem kết quả!`);
        });

        function loadImage(src) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.src = src;
            });
        }

        renderBtn.addEventListener('click', () => {
            if (loadedImages.length === 0) return alert('Vui lòng chọn ảnh trước!');

            const cols = parseInt(document.getElementById('cols').value);
            const gap = parseInt(document.getElementById('gap').value);
            const imgW = loadedImages[0].width;
            const imgH = loadedImages[0].height;
            
            const rows = Math.ceil(loadedImages.length / cols);
            
            canvas.width = (imgW * cols) + (gap * (cols - 1));
            canvas.height = (imgH * rows) + (gap * (rows - 1));

            ctx.fillStyle = "#ffffff"; // Nền trắng
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            loadedImages.forEach((img, i) => {
                const r = Math.floor(i / cols);
                const c = i % cols;
                const x = c * (imgW + gap);
                const y = r * (imgH + gap);
                ctx.drawImage(img, x, y, imgW, imgH);
            });

            downloadBtn.classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'bo-suu-tap-lien-quan.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
